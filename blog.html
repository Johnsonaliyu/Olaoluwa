<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Olaoluwa Age Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-card {
            background: var(--cream);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid transparent;
        }
        .skeleton-img  { height: 250px; }
        .skeleton-line { height: 16px; margin: 12px 0; }
        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-content { padding: 2rem; }

        /* Error / empty state */
        .blog-notice {
            text-align: center;
            padding: 5rem 2rem;
            color: #888;
            grid-column: 1 / -1;
        }
        .blog-notice .icon { font-size: 3rem; margin-bottom: 1rem; }
        .blog-notice p { font-size: 1.1rem; }

        /* Category badge */
        .blog-category {
            display: inline-block;
            background: var(--green);
            color: white;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            margin-bottom: 0.75rem;
        }

        /* Blog image placeholder */
        .blog-image-placeholder {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, var(--green) 0%, #1a3a0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-section" style="text-decoration: none; color: inherit;">
                <div class="logo-placeholder">
                    <img src="logo.jpg" alt="Olaoluwa Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <div class="logo">Olaoluwa Age Group</div>
                    <div class="tagline">Olaoluwa • Ajejentan</div>
                </div>
            </a>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#programs">Programs</a></li>
                <li><a href="index.html#team">Team</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <a href="index.html" class="cta-button">Back to Home</a>
        </div>
    </nav>

    <!-- Blog Header -->
    <div class="blog-header">
        <h1>Our Blog</h1>
        <p>Stories, updates, and insights from the Olaoluwa community</p>
    </div>

    <!-- Blog Posts Section -->
    <section class="blog">
        <div class="blog-container">
            <div class="blog-grid" id="blog-grid">
                <!-- Skeleton loaders shown while fetching -->
                <div class="skeleton-card">
                    <div class="skeleton skeleton-img"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line medium"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton skeleton-img"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line medium"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton skeleton-img"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line medium"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton skeleton-img"></div>
                    <div class="skeleton-content">
                        <div class="skeleton skeleton-line short"></div>
                        <div class="skeleton skeleton-line medium"></div>
                        <div class="skeleton skeleton-line"></div>

                    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="index.html#about">About</a>
                <a href="index.html#programs">Programs</a>
                <a href="index.html#team">Team</a>
                <a href="blog.html">Blog</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <p>&copy; 2026 Olaoluwa Age Group. All rights reserved. Olaoluwa • Ajejentan</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        /* ── Supabase config ── */
        const SUPABASE_URL = 'https://dupnvmizssjdqqxunvwn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1cG52bWl6c3NqZHFxeHVudnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk2NDMsImV4cCI6MjA5MTY4NTY0M30.WKUVX_WnAZnZ6ca6Tl8-oQC2i-N7exaaaRkA6FCMYeo';

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                return new Date(dateStr).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
            } catch { return dateStr; }
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blog-grid');
            if (!posts || posts.length === 0) {
                grid.innerHTML = `
                    <div class="blog-notice">
                        <div class="icon">📰</div>
                        <p>No posts published yet. Check back soon!</p>
                    </div>`;
                return;
            }

            grid.innerHTML = posts.map(post => `
                <div class="blog-card">
                    <div class="blog-image">
                        ${post.image_url
                            ? `<img src="${escHtml(post.image_url)}" alt="${escHtml(post.image_alt || post.title)}" style="width:100%;height:100%;object-fit:cover;">`
                            : `<div class="blog-image-placeholder">📰</div>`
                        }
                    </div>
                    <div class="blog-content">
                        <div>
                            ${post.category ? `<span class="blog-category">${escHtml(post.category)}</span>` : ''}
                            <div class="blog-date">📅 ${formatDate(post.date)}</div>
                            <h2 class="blog-title">${escHtml(post.title)}</h2>
                            <p class="blog-excerpt">${escHtml(post.excerpt)}</p>
                        </div>
                        <a href="blog-post.html?id=${encodeURIComponent(post.id)}" class="read-more-btn">Read Full Story →</a>
                    </div>
                </div>
            `).join('');
        }

        async function loadBlogPosts() {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/blog_posts?select=id,title,excerpt,date,image_url,image_alt,category,author,slug&status=eq.published&order=date.desc`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_KEY,
                        }
                    }
                );
                if (!res.ok) throw new Error('Failed to fetch posts');
                const posts = await res.json();
                renderPosts(posts);
            } catch (err) {
                console.error('Blog load error:', err);
                document.getElementById('blog-grid').innerHTML = `
                    <div class="blog-notice">
                        <div class="icon">⚠️</div>
                        <p>Could not load posts right now. Please try again later.</p>
                    </div>`;
            }
        }

        loadBlogPosts();
    </script>
</body>
</html>
