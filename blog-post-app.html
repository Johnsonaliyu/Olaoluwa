    <style>
        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .sk-title  { height: 48px; width: 75%; margin: 0 auto 1rem; }
        .sk-date   { height: 20px; width: 25%; margin: 0 auto 0.5rem; }
        .sk-img    { height: 400px; border-radius: 15px; margin-bottom: 3rem; }
        .sk-line   { height: 16px; margin-bottom: 14px; }
        .sk-line.w90 { width: 90%; }
        .sk-line.w75 { width: 75%; }
        .sk-line.w60 { width: 60%; }

        /* Post meta bar */
        .post-meta-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            font-size: 0.95rem;
            color: #777;
        }
        .post-meta-bar .meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .post-meta-bar .category-tag {
            background: var(--green);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
        }

        /* Article content styling */
        .blog-post-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            margin: 2.5rem 0 1rem;
        }
        .blog-post-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--charcoal);
            margin: 2rem 0 0.75rem;
        }
        .blog-post-content p { margin-bottom: 1.5rem; }
        .blog-post-content ul,
        .blog-post-content ol {
            margin: 0 0 1.5rem 1.5rem;
            line-height: 1.9;
        }
        .blog-post-content ul li,
        .blog-post-content ol li { margin-bottom: 0.4rem; }
        .blog-post-content strong { color: var(--charcoal); }
        .blog-post-content hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 2rem 0;
        }
        .blog-post-content blockquote {
            border-left: 4px solid var(--gold);
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: #555;
            font-style: italic;
        }

        /* Related posts */
        .related-posts { padding: 4rem 2rem; background: var(--sand); }
        .related-posts h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            text-align: center;
            margin-bottom: 2rem;
        }
        .related-posts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .related-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .related-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(45,80,22,0.12);
            text-decoration: none;
        }
        .related-card-img {
            height: 160px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--green), #1a3a0a);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; opacity: 0.7;
        }
        .related-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .related-card-body { padding: 1.25rem; }
        .related-card-date { font-size: 0.78rem; color: var(--green); font-weight: 600; margin-bottom: 0.4rem; }
        .related-card-title { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.4; color: var(--charcoal); }

        /* Error / not-found */
        .post-error {
            text-align: center;
            padding: 6rem 2rem;
        }
        .post-error .icon { font-size: 4rem; margin-bottom: 1.5rem; }
        .post-error h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem; color: var(--charcoal); }
        .post-error p { color: #777; margin-bottom: 2rem; font-size: 1.05rem; }

        /* Author + Share block */
        .author-share-block {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.25rem;
            margin: 1.75rem 0 2rem;
            padding: 1.4rem 1.6rem;
            background: linear-gradient(135deg, #f8faf5 0%, #f0f4eb 100%);
            border-left: 4px solid var(--green, #2D5016);
            border-radius: 0 12px 12px 0;
        }
        .author-info {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }
        .author-avatar {
            width: 44px; height: 44px;
            background: var(--green, #2D5016);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .author-details { display: flex; flex-direction: column; gap: 0.28rem; }
        .author-by-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
        }
        .author-name-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a2e0a;
            line-height: 1.2;
        }
        .author-date-row {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.15rem;
        }

        /* Social share */
        .share-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }
        .share-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #888;
        }
        .share-buttons {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px; height: 38px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            flex-shrink: 0;
        }
        .share-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.18); opacity: 0.9; }
        .share-btn.facebook { background: #1877F2; }
        .share-btn.whatsapp { background: #25D366; }
        .share-btn.x-twitter { background: #000; }
        .share-btn.linkedin  { background: #0A66C2; }
        .share-btn.telegram  { background: #229ED9; }

        @media (max-width: 600px) {
            .author-share-block { flex-direction: column; }
            .share-group { align-items: flex-start; }
        }
            .related-posts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .related-posts-grid { grid-template-columns: repeat(2, 1fr); }
            .post-meta-bar { gap: 0.75rem; }
        }
        @media (max-width: 480px) {
            .related-posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

            if (!dateStr) return '';

                });
            } catch { return dateStr; }

        function renderRelated(posts, currentId) {
            const others = posts.filter(p => p.id !== currentId).slice(0, 4);
            if (!others.length) return;
            const grid = document.getElementById('related-grid');
            grid.innerHTML = others.map(p => `
                <a href="blog-post.html?id=${encodeURIComponent(p.id)}" class="related-card">
                    <div class="related-card-img">
                        ${p.image_url
                            ? `<img src="${escHtml(p.image_url)}" alt="${escHtml(p.image_alt || p.title)}">`
                            : '📰'
                        }
                    </div>
                    <div class="related-card-body">
                        <div class="related-card-date">📅 ${formatDate(p.date)}</div>
                        <div class="related-card-title">${escHtml(p.title)}</div>
                    </div>
                </a>
            `).join('');
            document.getElementById('related-section').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('post-header').innerHTML = `
                <h1 style="font-size:1.8rem;">Post Not Found</h1>`;
            document.getElementById('post-container').innerHTML = `
                <div class="post-error">
                    <div class="icon">📭</div>
                    <h2>Post Not Found</h2>
                    <p>${escHtml(message)}</p>
                    <a href="blog.html" class="primary-btn">← Back to Blog</a>
                </div>`;
        }

        async function loadPost() {
            const id = getPostId();
            if (!id) { showError('No post ID was specified.'); return; }

            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
            };

            try {
                /* Fire both requests simultaneously — no waterfall */
                const [res, relRes] = await Promise.all([
                    fetch(
                        `${SUPABASE_URL}/rest/v1/blog_posts?id=eq.${encodeURIComponent(id)}&status=eq.published&select=*`,
                        { headers }
                    ),
                    fetch(
                        `${SUPABASE_URL}/rest/v1/blog_posts?select=id,title,date,image_url,image_alt&status=eq.published&order=date.desc&limit=5`,
                        { headers }
                    )
                ]);

                if (!res.ok) throw new Error('Network error');
                const posts = await res.json();
                if (!posts || posts.length === 0) {
                    showError('This post does not exist or has been unpublished.');
                    return;
                }

                renderPost(posts[0]);

                if (relRes.ok) {
                    const related = await relRes.json();
                    renderRelated(related, posts[0].id);
                }

            } catch (err) {
                console.error('Post load error:', err);
                showError('Could not load this post. Please try again later.');
            }
        }

        loadPost();
    </script>
