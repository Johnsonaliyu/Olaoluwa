<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Olaoluwa Age Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .sk-title  { height: 48px; width: 75%; margin: 0 auto 1rem; }
        .sk-date   { height: 20px; width: 25%; margin: 0 auto 0.5rem; }
        .sk-img    { height: 400px; border-radius: 15px; margin-bottom: 3rem; }
        .sk-line   { height: 16px; margin-bottom: 14px; }
        .sk-line.w90 { width: 90%; }
        .sk-line.w75 { width: 75%; }
        .sk-line.w60 { width: 60%; }

        /* Post meta bar */
        .post-meta-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            font-size: 0.95rem;
            color: #777;
        }
        .post-meta-bar .meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .post-meta-bar .category-tag {
            background: var(--green);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
        }

        /* Article content styling */
        .blog-post-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            margin: 2.5rem 0 1rem;
        }
        .blog-post-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--charcoal);
            margin: 2rem 0 0.75rem;
        }
        .blog-post-content p { margin-bottom: 1.5rem; }
        .blog-post-content ul,
        .blog-post-content ol {
            margin: 0 0 1.5rem 1.5rem;
            line-height: 1.9;
        }
        .blog-post-content ul li,
        .blog-post-content ol li { margin-bottom: 0.4rem; }
        .blog-post-content strong { color: var(--charcoal); }
        .blog-post-content hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 2rem 0;
        }
        .blog-post-content blockquote {
            border-left: 4px solid var(--gold);
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: #555;
            font-style: italic;
        }

        /* Related posts */
        .related-posts { padding: 4rem 2rem; background: var(--sand); }
        .related-posts h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            text-align: center;
            margin-bottom: 2rem;
        }
        .related-posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .related-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .related-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(45,80,22,0.12);
            text-decoration: none;
        }
        .related-card-img {
            height: 160px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--green), #1a3a0a);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; opacity: 0.7;
        }
        .related-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .related-card-body { padding: 1.25rem; }
        .related-card-date { font-size: 0.78rem; color: var(--green); font-weight: 600; margin-bottom: 0.4rem; }
        .related-card-title { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.4; color: var(--charcoal); }

        /* Error / not-found */
        .post-error {
            text-align: center;
            padding: 6rem 2rem;
        }
        .post-error .icon { font-size: 4rem; margin-bottom: 1.5rem; }
        .post-error h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem; color: var(--charcoal); }
        .post-error p { color: #777; margin-bottom: 2rem; font-size: 1.05rem; }

        @media (max-width: 768px) {
            .related-posts-grid { grid-template-columns: 1fr; }
            .post-meta-bar { gap: 0.75rem; }
        }
        @media (max-width: 480px) {
            .related-posts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-section" style="text-decoration: none; color: inherit;">
                <div class="logo-placeholder">
                    <img src="logo.jpg" alt="Olaoluwa Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <div class="logo">Olaoluwa Age Group</div>
                    <div class="tagline">Olaoluwa • Ajejentan</div>
                </div>
            </a>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#programs">Programs</a></li>
                <li><a href="index.html#team">Team</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <a href="blog.html" class="cta-button">← Back to Blog</a>
        </div>
    </nav>

    <!-- Dynamic post header (filled by JS) -->
    <div class="blog-post-header" id="post-header">
        <!-- Skeleton while loading -->
        <div class="skeleton sk-date" style="margin:0 auto 1rem;"></div>
        <div class="skeleton sk-title"></div>
    </div>

    <!-- Article content -->
    <section class="blog-post-section" id="post-section">
        <div class="blog-post-container" id="post-container">
            <!-- Skeleton while loading -->
            <div class="skeleton sk-img"></div>
            <div class="skeleton sk-line w90"></div>
            <div class="skeleton sk-line w75"></div>
            <div class="skeleton sk-line w90"></div>
            <div class="skeleton sk-line w60"></div>
            <div class="skeleton sk-line w90"></div>
            <div class="skeleton sk-line w75"></div>
        </div>
    </section>

    <!-- Related posts (filled by JS) -->
    <section class="related-posts" id="related-section" style="display:none;">
        <h3>More from the Blog</h3>
        <div class="related-posts-grid" id="related-grid"></div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <p>&copy; 2026 Olaoluwa Age Group. All rights reserved. | Olaoluwa • Ajejentan</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        /* ── Supabase config ── */
        const SUPABASE_URL   = 'https://dupnvmizssjdqqxunvwn.supabase.co';
        const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1cG52bWl6c3NqZHFxeHVudnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk2NDMsImV4cCI6MjA5MTY4NTY0M30.WKUVX_WnAZnZ6ca6Tl8-oQC2i-N7exaaaRkA6FCMYeo';
        

        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                return new Date(dateStr).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
            } catch { return dateStr; }
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function renderPost(post) {
            /* ── Page title ── */
            document.title = (post.title || 'Blog Post') + ' - Olaoluwa Age Group';

            /* ── Header ── */
            document.getElementById('post-header').innerHTML = `
                <p style="color:#d4af37;font-weight:600;margin-bottom:0.75rem;">📅 ${formatDate(post.date)}</p>
                <h1>${escHtml(post.title)}</h1>
                ${post.category ? `<p style="margin-top:1rem;opacity:0.85;font-size:0.95rem;">🏷 ${escHtml(post.category)}</p>` : ''}
            `;

            /* ── Article body ── */
            const container = document.getElementById('post-container');
            container.innerHTML = `
                ${post.image_url
                    ? `<div class="blog-post-featured-image">
                           <img src="${escHtml(post.image_url)}" alt="${escHtml(post.image_alt || post.title)}"
                                style="width:100%;height:100%;object-fit:cover;">
                       </div>`
                    : ''
                }

                <div class="post-meta-bar">
                    ${post.author ? `<span class="meta-item">✍ ${escHtml(post.author)}</span>` : ''}
                    ${post.category ? `<span class="category-tag">${escHtml(post.category)}</span>` : ''}
                    <span class="meta-item">📅 ${formatDate(post.date)}</span>
                </div>

                <article class="blog-post-content">
                    ${post.content || '<p>No content available.</p>'}
                </article>

                <div class="blog-post-footer">
                    <a href="blog.html" class="primary-btn">← Back to All Posts</a>
                </div>
            `;
        }

        function renderRelated(posts, currentId) {
            const others = posts.filter(p => p.id !== currentId).slice(0, 3);
            if (!others.length) return;
            const grid = document.getElementById('related-grid');
            grid.innerHTML = others.map(p => `
                <a href="blog-post.html?id=${encodeURIComponent(p.id)}" class="related-card">
                    <div class="related-card-img">
                        ${p.image_url
                            ? `<img src="${escHtml(p.image_url)}" alt="${escHtml(p.image_alt || p.title)}">`
                            : '📰'
                        }
                    </div>
                    <div class="related-card-body">
                        <div class="related-card-date">📅 ${formatDate(p.date)}</div>
                        <div class="related-card-title">${escHtml(p.title)}</div>
                    </div>
                </a>
            `).join('');
            document.getElementById('related-section').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('post-header').innerHTML = `
                <h1 style="font-size:1.8rem;">Post Not Found</h1>`;
            document.getElementById('post-container').innerHTML = `
                <div class="post-error">
                    <div class="icon">📭</div>
                    <h2>Post Not Found</h2>
                    <p>${escHtml(message)}</p>
                    <a href="blog.html" class="primary-btn">← Back to Blog</a>
                </div>`;
        }

        async function loadPost() {
            const id = getPostId();
            if (!id) { showError('No post ID was specified.'); return; }

            try {
                /* Fetch this post */
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/blog_posts?id=eq.${encodeURIComponent(id)}&status=eq.published&select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_KEY,
                        }
                    }
                );
                if (!res.ok) throw new Error('Network error');
                const posts = await res.json();
                if (!posts || posts.length === 0) {
                    showError('This post does not exist or has been unpublished.');
                    return;
                }

                renderPost(posts[0]);

                /* Fetch related posts (other published, most recent) */
                const relRes = await fetch(
                    `${SUPABASE_URL}/rest/v1/blog_posts?select=id,title,date,image_url,image_alt&status=eq.published&order=date.desc&limit=4`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_KEY,
                        }
                    }
                );
                if (relRes.ok) {
                    const related = await relRes.json();
                    renderRelated(related, posts[0].id);
                }

            } catch (err) {
                console.error('Post load error:', err);
                showError('Could not load this post. Please try again later.');
            }
        }

        loadPost();
    </script>
</body>
</html>
