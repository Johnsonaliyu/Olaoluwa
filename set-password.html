<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Password — Olaoluwa Age Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2a4a35;
      --green-dark: #1a3225;
      --green-light: #3a6347;
      --gold: #c9a96e;
      --cream: #f7f3ed;
      --cream-dark: #ede7dc;
      --text: #1e1e1e;
      --text-muted: #6b6b5e;
    }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(42,74,53,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 20px;
      border: 1px solid rgba(42,74,53,0.12);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: #fff;
      border: 1px solid rgba(42,74,53,0.14);
      padding: 52px 48px;
      position: relative;
      box-shadow: 0 8px 48px rgba(42,74,53,0.08), 0 2px 8px rgba(0,0,0,0.04);
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
    }

    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--green-dark);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .logo-subtitle {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }

    .welcome-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-dark);
    }
    .divider span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(42,74,53,0.2);
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    input[type="password"]:focus {
      border-color: var(--green);
      background: #fff;
    }

    /* Password strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-bar span {
      flex: 1;
      height: 3px;
      background: var(--cream-dark);
      transition: background 0.3s;
      border-radius: 2px;
    }
    .strength-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      min-height: 16px;
      transition: color 0.3s;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 28px;
      background: var(--green);
      color: var(--cream);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover  { background: var(--green-light); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(247,243,237,0.3);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error   { background: #fdf0f0; color: #b94040; border-left: 3px solid #b94040; display: block; }
    .message.success { background: #f0f5f1; color: var(--green); border-left: 3px solid var(--green); display: block; }

    /* Invalid token state */
    .invalid-state {
      text-align: center;
      display: none;
    }
    .invalid-state.show { display: block; }
    .invalid-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .invalid-state p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .invalid-state a {
      display: inline-block;
      margin-top: 20px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      text-decoration: none;
      border-bottom: 1px solid var(--green);
      padding-bottom: 2px;
    }

    .form-content.hidden { display: none; }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="card">

    <div class="logo-area">

      <!--
        =====================================================
        LOGO
        =====================================================
      -->
      <img
        src="./logo.jpg"
        alt="Olaoluwa Age Group Logo"
        class="logo-icon"
        onerror="this.style.display='none'; document.getElementById('fallback-svg').style.display='block';"
      />
      <!-- Fallback SVG shown only if logo image fails to load -->
      <svg id="fallback-svg" class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <circle cx="26" cy="26" r="24" stroke="#2a4a35" stroke-width="1.2"/>
        <circle cx="26" cy="26" r="18" stroke="#c9a96e" stroke-width="0.8" stroke-dasharray="3 3"/>
        <path d="M26 10 L29 20 L40 20 L31 27 L34 38 L26 31 L18 38 L21 27 L12 20 L23 20 Z" fill="#2a4a35" opacity="0.85"/>
      </svg>

      <div class="logo-title">Olaoluwa Age Group</div>
      <div class="logo-subtitle">Admin Portal</div>
    </div>

    <!-- Invalid / expired token -->
    <div class="invalid-state" id="invalidState">
      <div class="invalid-icon">🔒</div>
      <p>This invitation link has expired or is invalid.<br/>Please contact your administrator.</p>
      <a href="/login.html">← Back to Login</a>
    </div>

    <!-- Set password form -->
    <div class="form-content" id="formContent">
      <p class="welcome-text">You've been invited. Set a password<br/>to activate your account.</p>
      <div class="divider"><span>create password</span></div>

      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="••••••••" oninput="checkStrength(this.value)"/>
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••"/>
      </div>

      <button class="btn" id="setBtn" type="button">
        <span class="btn-text">Activate Account</span>
        <div class="spinner"></div>
      </button>

      <div class="message" id="message"></div>
    </div>

    <div class="footer-note">
      Contact the Webmaster on 08053983988
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://dupnvmizssjdqqxunvwn.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1cG52bWl6c3NqZHFxeHVudnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDk2NDMsImV4cCI6MjA5MTY4NTY0M30.WKUVX_WnAZnZ6ca6Tl8-oQC2i-N7exaaaRkA6FCMYeo';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let sessionReady = false;

  // Listen for auth state — this fires when hash token is processed
  supabase.auth.onAuthStateChange((event, session) => {
    if ((event === 'SIGNED_IN' || event === 'USER_UPDATED') && session) {
      sessionReady = true;
      // Make sure form is visible
      document.getElementById('invalidState').classList.remove('show');
      document.getElementById('formContent').classList.remove('hidden');
    } else if (!sessionReady && !session) {
      // Only show invalid if we never got a session
      setTimeout(() => {
        if (!sessionReady) {
          document.getElementById('invalidState').classList.add('show');
          document.getElementById('formContent').classList.add('hidden');
        }
      }, 3000); // wait 3 seconds before giving up
    }
  });

  function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
  }

  function setLoading(loading) {
    const btn = document.getElementById('setBtn');
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  function checkStrength(val) {
    const bars   = [1,2,3,4].map(i => document.getElementById('s'+i));
    const label  = document.getElementById('strengthLabel');
    const colors = { 1: '#e07070', 2: '#e0a850', 3: '#7ab87a', 4: '#2a4a35' };
    const labels = { 1: 'Weak', 2: 'Fair', 3: 'Good', 4: 'Strong' };

    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))          score++;
    if (/[0-9]/.test(val))          score++;
    if (/[^A-Za-z0-9]/.test(val))   score++;

    bars.forEach((b, i) => {
      b.style.background = i < score ? colors[score] : 'var(--cream-dark)';
    });
    label.textContent = val.length ? labels[score] || '' : '';
    label.style.color = colors[score] || 'var(--text-muted)';
  }

  async function handleSetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (!password || !confirm) {
      showMessage('Please fill in both fields.', 'error');
      return;
    }
    if (password !== confirm) {
      showMessage('Passwords do not match.', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters.', 'error');
      return;
    }

    setLoading(true);

    try {
      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        showMessage('Error: ' + error.message, 'error');
      } else {
        showMessage('Account activated! Redirecting to login…', 'success');
        setTimeout(() => window.location.href = '/login.html', 2000);
      }
    } catch (err) {
      showMessage('Caught error: ' + err.message, 'error');
    }

    setLoading(false);
  }

  document.getElementById('setBtn').addEventListener('click', handleSetPassword);
  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSetPassword(); });
  </script>
</body>
</html>
